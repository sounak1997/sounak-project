<div class="auth-page">
  <div class="auth-brand">
    <div class="brand-icon">
      <mat-icon>bolt</mat-icon>
    </div>
    <h2>SounakApp</h2>
    <p>Angular 20 · Signals · NgRx · Redis · RabbitMQ</p>
  </div>

  <div class="auth-card">
    <div class="card-header">
      <mat-icon class="header-icon">lock_open</mat-icon>
      <h1>Welcome back</h1>
      <p>Sign in to your account</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email address</mat-label>
        <mat-icon matPrefix>email</mat-icon>
        <input matInput type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <mat-icon matPrefix>lock</mat-icon>
        <input matInput [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" required />
        <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword">
          <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <button mat-raised-button class="submit-btn" type="submit" [disabled]="loading">
        <mat-icon>{{ loading ? 'hourglass_empty' : 'login' }}</mat-icon>
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="card-footer">
      <span>Don't have an account?</span>
      <a routerLink="/register">Create one</a>
    </div>
  </div>
</div>
